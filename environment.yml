name: phorce
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - rdkit>=2023.3
  - pip
  - pip:
    - numpy>=1.24
    - pandas>=2.0
    - scikit-learn>=1.3
    - scipy>=1.10
    - matplotlib>=3.8
    - seaborn>=0.12
    - xgboost>=2.0
    - tqdm>=4.66

# Dev/testing tools (install separately if needed):
# - pytest>=7.0
# - pytest-cov>=4.0
# - black>=23.0
# - ruff>=0.1.0
# - mypy>=1.0

# Notes:
# - rdkit is installed from conda-forge because it's not available on PyPI in the
#   same binary form. The rest are installed via pip to match versions from
#   pyproject.toml while keeping resolver simple.
# - xgboost and tqdm are required by scripts/analyze_domains.py and
#   scripts/analyze_subdomains.py (XGBClassifier; progress bars).
